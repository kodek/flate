name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race -timeout 5m ./...
      - name: Build
        run: go build -v ./...
