name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          check-latest: true
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race -timeout 5m ./...
      - name: Build
        run: go build -v ./...
