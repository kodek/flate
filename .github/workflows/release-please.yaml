---
# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: release-please

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  release-please:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Generate Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.BOT_CLIENT_ID }}
          private-key: ${{ secrets.BOT_APP_PRIVATE_KEY }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Release Please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # skip-github-release: true means release-please-action never sets
      # release_created/tag_name, so gate on the merge commit message instead
      # and push the tag ourselves to trigger the release workflow.
      - name: Push tag
        if: "startsWith(github.event.head_commit.message, 'chore(main): release ')"
        env:
          HEAD_MSG: ${{ github.event.head_commit.message }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |-
          TAG=$(printf '%s' "$HEAD_MSG" | head -n1 | sed -nE 's/^chore\(main\): release ([0-9]+\.[0-9]+\.[0-9]+).*/\1/p')
          if [ -z "$TAG" ]; then
            echo "could not parse version from head commit message" >&2
            exit 1
          fi
          gh api --method POST "/repos/${GITHUB_REPOSITORY}/git/refs" \
            -f "ref=refs/tags/${TAG}" \
            -f "sha=${GITHUB_SHA}"
