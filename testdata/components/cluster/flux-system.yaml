apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: flux-system
  namespace: flux-system
spec:
  url: https://example.test/cluster.git
  ref:
    branch: main
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-a
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/app-a
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: ns-a
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: app-b
  namespace: flux-system
spec:
  interval: 10m
  path: ./apps/app-b
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
  targetNamespace: ns-b
