---
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2
project_name: flate

before:
  hooks:
    - go mod tidy

builds:
  - id: flate
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    main: ./cmd/flate/main.go
    binary: flate

archives:
  - id: flate
    ids:
      - flate
    format_overrides:
      - goos: windows
        formats:
          - zip

upx:
  - enabled: true
    compress: best
    lzma: true

checksum:
  name_template: checksums.txt
  algorithm: sha256
  split: true

sboms:
  - artifacts: archive
    documents:
      - "{{ .ArtifactName }}.sbom.json"

signs:
  - cmd: cosign
    certificate: "${artifact}.crt"
    args:
      - sign-blob
      - --output-certificate=${certificate}
      - --output-signature=${signature}
      - --yes
      - ${artifact}
    artifacts: all
    output: true
